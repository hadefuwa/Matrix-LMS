<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Detail - Matrix LMS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="back-link" href="index.html">← Back to all units</a>
        <h1 id="unitTitle">Unit</h1>
        <p id="unitSubtitle">BTEC Engineering</p>
      </div>
    </header>

    <main class="container unit-layout">
      <img id="unitHero" class="unit-hero" alt="Unit image" />

      <section class="panel">
        <h2>Unit Description</h2>
        <p id="unitDescription"></p>
      </section>

      <section class="panel">
        <h2>Learning Objectives</h2>
        <div id="objectivesContent" class="objectives-content"></div>
      </section>

      <section class="panel">
        <h2>Scheme of Work (sample)</h2>
        <ol id="sowList"></ol>
      </section>

      <section class="panel">
        <h2>Matrix Hardware</h2>
        <img
          class="hardware-image"
          src="https://www.matrixtsl.com/wp-content/uploads/elementor/thumbs/Fundamental-Mechananics-Beauty-Shot-r3dsaoku30ll1dub2a9igiadth8egm9ubi52vt6noa.png"
          alt="Matrix Fundamental Mechanics equipment"
          loading="lazy"
        />
        <p id="hardwareSummary"></p>
        <ul id="hardwareList"></ul>
      </section>

      <section class="panel">
        <h2>Documentation</h2>
        <ul id="docsList" class="docs-list"></ul>
      </section>

      <section class="panel">
        <h2>Related Videos (Playlist)</h2>
        <p>Shared playlist for all units in this prototype.</p>

        <div id="videoSlider" class="video-slider" aria-label="Playlist videos"></div>

        <div class="video-embed">
          <iframe
            id="videoPlayer"
            title="Selected unit video"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
      </section>
    </main>

    <script src="units.js"></script>
    <script src="unit.js"></script>
  </body>
</html>
