name: Responsive QA

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  responsive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run responsive QA
        run: npm run qa:responsive

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: responsive-qa-artifacts
          path: qa-artifacts/responsive
